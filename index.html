<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b141a;
  color: white;
}

/* login */
#auth {
  background: #202c33;
  padding: 10px;
}

/* usuarios */
#users {
  background: #111b21;
  padding: 10px;
}

/* chat */
#chat {
  background: #0b141a;
  height: 300px;
  overflow-y: auto;
  padding: 10px;
}

input {
  margin: 5px;
  padding: 5px;
}

button {
  background: #00a884;
  color: white;
  border: none;
  padding: 5px 10px;
}
</style>
</head>

<body>

<div id="auth">
  <h3>Registro</h3>
  <input id="email" placeholder="Correo"><br>
  <input id="user" placeholder="Usuario"><br>
  <input id="pass" placeholder="Contraseña"><br>
  <button onclick="register()">Registrarse</button>

  <h3>Login</h3>
  <input id="emailLogin" placeholder="Correo"><br>
  <input id="passLogin" placeholder="Contraseña"><br>
  <button onclick="login()">Entrar</button>
</div>

<h3>Usuarios</h3>
<div id="users"></div>

<h3>Modo</h3>
<button onclick="setMode('global')">🌍 Foro</button>
<button onclick="setMode('private')">👤 Privado</button>

<h3>Chat</h3>
<div id="chat"></div>

<input id="msg">
<button onclick="send()">Enviar</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = "";
let currentChat = "";
let mode = "global"
function setMode(newMode) {
  mode = newMode;
  chat.innerHTML = "";
  alert("Modo: " + newMode);
}

// REGISTRO
async function register() {
  const res = await fetch("/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      username: user.value,
      password: pass.value
    })
  });

  alert(await res.text());
}

// LOGIN
async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: emailLogin.value,
      password: passLogin.value
    })
  });

  const data = await res.json();

  if (data.success) {
    username = data.username;
    socket.emit("login", username);

    document.getElementById("auth").style.display = "block";
    alert("Bienvenido " + username);
  } else {
    alert("Error");
  }
}

// USUARIOS
socket.on("users list", (list) => {
  users.innerHTML = "";

  list.forEach(user => {
    if (user !== username) {
      const div = document.createElement("div");
      div.textContent = user;
      div.onclick = () => currentChat = user;
      users.appendChild(div);
    }
  });
});

// ENVIAR
function send() {
  if (mode === "global") {
    socket.emit("global message", {
      user: username,
      text: msg.value
    });

    chat.innerHTML += "<div>🌍 " + username + ": " + msg.value + "</div>";
  }

  else if (mode === "private") {
    if (!currentChat) return alert("Selecciona usuario");

    socket.emit("private message", {
      to: currentChat,
      from: username,
      text: msg.value
    });

    chat.innerHTML += "<div>Yo: " + msg.value + "</div>";
  }

  msg.value = "";
}

// RECIBIR GLOBAL
socket.on("global message", (data) => {
  chat.innerHTML += "<div>🌍 " + data.user + ": " + data.text + "</div>";
});

// RECIBIR PRIVADO
socket.on("private message", (data) => {
  chat.innerHTML += "<div>" + data.from + ": " + data.text + "</div>";
});
</script>

</body>
</html>
